<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/style.css">
    <script src="https://kit.fontawesome.com/3ffcd25420.js" crossorigin="anonymous"></script>
    <title>Vicky Liu | 香格里拉</title>
</head>
<body>
    <div id="placeholder"></div>
    <div class="post">
        <div class="post-item">
            <h3 class="card-title">香格里拉</h3>
            <strong class="card-date">Apr 2016</strong>
            <img src="/Images/香格里拉.jpeg" class="card-img post-img">
            <p class="card-content">
                两心相隔，<br>
                已不能用距离描述。<br>
                你沉睡在喧闹的世界中，<br>
                你的灵魂是否飘在空中？<br><br>
                都说，<br>
                人之初，性本善。<br>
                到了生命的末尾，<br>
                你是否还保留着最初的梦想？<br><br>
                这个世界的死，<br>
                终将成为另一个世界的生。<br>
                你去了那最美的天堂，<br>
                是否依旧安好？<br><br>
                闭上眼的一刹那，<br>
                意味着这一辈子的不再见。<br>
                你是否依旧记得，<br>
                曾经无忧无虑的时光？<br><br>
                陪伴是最深情的告白，<br>
                可是有没有人，<br>
                伴着你，<br>
                走在一条去往天堂的路上？<br><br>
                真正到来的时候，<br>
                没有一滴眼泪。<br>
                或是曾经年幼，<br>
                不懂得这一别便是永别。<br><br>
                一手拿着吃到一半的棒棒糖，<br>
                一手拿着高高飞翔的大风筝，<br>
                一个人走着，<br>
                去往最美的地方。
            </p>
        </div>
    </div>
    <script src="/script.js"></script>
</body>
</html>
